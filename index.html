<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Калибровка — насколько хорошо ты знаешь, что знаешь?</title>
    <meta name="description" content="Игра на критическое мышление: 15 утверждений, один жест задаёт и ответ, и уверенность. Здесь выигрывает честность с собой, а не эрудиция.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,500&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

    <!-- ═══ START / WARM-UP ═══ -->
    <div class="screen start-screen active" id="startScreen">
        <div class="lang-toggle" id="langToggle">
            <button class="lang-btn" data-lang="ru" id="langBtnRu">RU</button>
            <span class="lang-sep">/</span>
            <button class="lang-btn" data-lang="en" id="langBtnEn">EN</button>
        </div>

        <div class="cover">
            <h1 class="cover-title">КАЛИБРОВКА</h1>
            <p class="cover-subtitle" id="coverSubtitle">Здесь выигрывает честность с собой, а не эрудиция.</p>
        </div>

        <div class="warmup" id="warmupBlock">
            <div class="warmup-label" id="warmupLabel">Разминка</div>
            <blockquote class="statement warmup-statement" id="warmupStatement"></blockquote>
            <div class="gauge" id="warmupGauge"></div>
            <div class="warmup-hint" id="warmupHint"></div>
        </div>

        <div class="reveal warmup-reveal" id="warmupReveal" hidden></div>

        <button class="lock-btn start-btn" id="startBtn" hidden>Начать</button>
    </div>

    <!-- ═══ READING ═══ -->
    <div class="screen" id="feedScreen">
        <header class="doc-header">
            <div class="doc-header-row">
                <span class="doc-wordmark" id="topWordmark">Калибровка</span>
                <span class="doc-reading" id="topProgress">01 / 15</span>
            </div>
            <div class="doc-rule"><div class="doc-rule-fill" id="topProgressFill" style="width:0%"></div></div>
        </header>
        <main class="reading" id="readingPanel"></main>
    </div>

    <!-- ═══ RESULT ═══ -->
    <div class="screen result-screen" id="resultScreen">
        <div class="result">
            <div class="result-kicker" id="resultKicker">Готово</div>

            <div class="result-hero">
                <div class="result-score" id="resultScoreValue">0%</div>
                <div class="result-score-word" id="calibrationWord">Твоя калибровка</div>
            </div>
            <p class="result-explain" id="scoreExplain"></p>
            <div class="result-accuracy" id="accuracyLine"></div>

            <div class="archetype">
                <div class="archetype-label" id="profileLabel">Кто ты по итогу</div>
                <div class="archetype-title" id="archetypeTitle">—</div>
                <div class="archetype-desc" id="archetypeDesc"></div>
            </div>

            <section class="reliability" id="reliabilityBlock" hidden>
                <h2 class="block-title" id="reliabilityTitle"></h2>
                <div id="reliabilityRows"></div>
            </section>

            <section class="facts">
                <h2 class="block-title" id="factsTitle">Разбор</h2>
                <div id="factsList"></div>
            </section>

            <div class="result-actions">
                <button class="btn-ghost" id="shareBtn">Поделиться</button>
                <button class="lock-btn" id="restartBtn">Ещё раз</button>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="i18n.js"></script>
<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
