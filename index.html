<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Калибровка — насколько хорошо ты знаешь, что знаешь?</title>
    <meta name="description" content="Калибровочная игра на критическое мышление: 15 утверждений, один жест — ответ и уверенность одновременно. Полный разбор — сертификатом в конце.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,500&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

    <!-- ═══ START / COVER SHEET ═══ -->
    <div class="screen start-screen active" id="startScreen">
        <div class="lang-toggle" id="langToggle">
            <button class="lang-btn" data-lang="ru" id="langBtnRu">RU</button>
            <span class="lang-sep">/</span>
            <button class="lang-btn" data-lang="en" id="langBtnEn">EN</button>
        </div>

        <div class="start-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" width="30" height="30">
                <circle cx="16" cy="16" r="12.5" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <line x1="16" y1="2.2" x2="16" y2="5.4" stroke="currentColor" stroke-width="1.4"/>
                <line x1="16" y1="26.6" x2="16" y2="29.8" stroke="currentColor" stroke-width="1.4"/>
                <line x1="2.2" y1="16" x2="5.4" y2="16" stroke="currentColor" stroke-width="1.4"/>
                <line x1="26.6" y1="16" x2="29.8" y2="16" stroke="currentColor" stroke-width="1.4"/>
                <line x1="16" y1="16" x2="23" y2="9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                <circle cx="16" cy="16" r="1.8" fill="currentColor"/>
            </svg>
        </div>
        <div class="start-wordmark" id="startTitle">Калибровка</div>

        <h1 class="start-tagline" id="startTagline"></h1>
        <p class="start-desc" id="startDesc"></p>

        <div class="start-rule"></div>

        <ol class="start-how" id="startHow">
            <li><h2 class="how-title" id="howTitle">Как играть</h2></li>
            <li><span class="how-num">01</span><span class="how-text" id="how1"></span></li>
            <li><span class="how-num">02</span><span class="how-text" id="how2"></span></li>
            <li><span class="how-num">03</span><span class="how-text" id="how3"></span></li>
        </ol>

        <button class="lock-btn start-btn" id="startBtn">Начать</button>
    </div>

    <!-- ═══ READING (one statement at a time) ═══ -->
    <div class="screen" id="feedScreen">
        <header class="doc-header">
            <div class="doc-header-row">
                <span class="doc-wordmark" id="topWordmark">Калибровка</span>
                <span class="doc-reading" id="topProgress">01 / 15</span>
            </div>
            <div class="doc-rule"><div class="doc-rule-fill" id="topProgressFill" style="width:0%"></div></div>
        </header>
        <main class="reading" id="readingPanel"></main>
    </div>

    <!-- ═══ CERTIFICATE ═══ -->
    <div class="screen result-screen" id="resultScreen">
        <div class="cert">
            <div class="cert-serial" id="certSerial">№ 000000</div>
            <div class="cert-title" id="certTitleText">Сертификат калибровки</div>

            <div class="cert-score-block">
                <div class="cert-score-label" id="resultTitleLabel">Итоговая точность прибора</div>
                <div class="cert-score" id="resultScoreValue">0%</div>
                <div class="cert-stamp" id="archetypeStamp">—</div>
            </div>

            <div class="cert-stats">
                <div class="cert-stat-row"><span id="accuracyLabel">Точность</span><span class="mono" id="accuracyValue">0/15</span></div>
                <div class="cert-stat-row"><span id="calibrationLabel">Калибровка</span><span class="mono" id="calibValue">0%</span></div>
            </div>

            <p class="cert-archetype-desc" id="archetypeDesc"></p>

            <div class="cert-chart" id="calibChart" style="display:none;">
                <div class="cert-section-label" id="chartTitle"></div>
                <div id="calibChartRows"></div>
            </div>

            <div class="cert-section-label" id="logLabel">Журнал измерений</div>
            <div class="cert-table" id="certTable"></div>

            <div class="cert-actions">
                <button class="btn-outline-mono" id="shareBtn">Поделиться</button>
                <button class="lock-btn" id="restartBtn">Ещё раз</button>
            </div>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script src="i18n.js"></script>
<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
